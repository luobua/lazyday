<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>您的 Lazyday 配额已用尽</title>
</head>
<body style="margin:0;background:#f6f7fb;font-family:Arial,'Microsoft YaHei',sans-serif;color:#1f2937;">
<main style="max-width:640px;margin:0 auto;padding:32px 24px;">
    <h1 style="margin:0 0 20px;font-size:24px;color:#111827;">Lazyday</h1>
    <section style="background:#ffffff;border:1px solid #e5e7eb;border-radius:8px;padding:28px;">
        <h2 style="margin:0 0 16px;font-size:20px;">您的 Lazyday 配额已用尽</h2>
        <p style="line-height:1.7;">租户 <strong th:text="${tenantName}">Acme</strong> 的 <strong th:text="${period}">day</strong> 配额已达到上限。</p>
        <p style="line-height:1.7;">配额上限：<strong th:text="${limit}">1000</strong>，当前用量：<strong th:text="${usage}">1001</strong>。</p>
        <p style="margin:28px 0;">
            <a th:href="${portalUrl}" style="display:inline-block;background:#111827;color:#ffffff;text-decoration:none;padding:12px 18px;border-radius:6px;">查看配额</a>
        </p>
        <p style="word-break:break-all;color:#4b5563;" th:text="${portalUrl}">https://portal.lazyday.dev/quota</p>
    </section>
</main>
</body>
</html>
