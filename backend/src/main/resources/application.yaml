fan:
  service:
    domain-host: http://127.0.0.1:${server.port}
    context-path-v1: /api/lazyday/v1
    context-path-v2: /api/lazyday/v2
    open-context-path-v1: /api/open/v1
    portal-context-path-v1: /api/portal/v1
    admin-context-path-v1: /api/admin/v1
    internal-context-path-v1: /internal/v1
    internal-api-key: ${LAZYDAY_INTERNAL_API_KEY:lazyday-internal-dev-key-32-chars}
    call-log-buffer-size: ${LAZYDAY_CALL_LOG_BUFFER_SIZE:10000}
    webhook:
      dispatch-enabled: ${SERVICE_WEBHOOK_DISPATCH_ENABLED:true}
      dispatch-interval-seconds: ${SERVICE_WEBHOOK_DISPATCH_INTERVAL_SECONDS:5}
      http-timeout-ms: ${SERVICE_WEBHOOK_HTTP_TIMEOUT_MS:10000}
      max-retries: ${SERVICE_WEBHOOK_MAX_RETRIES:5}
      backoff-sequence: ${SERVICE_WEBHOOK_BACKOFF_SEQUENCE:60,300,1800,7200,21600}
    email:
      from: ${SERVICE_EMAIL_FROM:noreply@lazyday.dev}
    snowflake:
      worker-id: ${LAZYDAY_SNOWFLAKE_WORKER_ID:1}
      data-center-id: ${LAZYDAY_SNOWFLAKE_DATA_CENTER_ID:1}
    encryption-key: xunwei-key
    access-key: xunwei-access-key
    secret-key: xunwei-secret-key
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
database:
  dialect: postgresql
  type: postgresql
  host: 127.0.0.1
  port: 5432
  dbname: lazyday
  username: postgres
  password: postgres
  options: "?useUnicode=true&&stringtype=unspecified&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowMultiQueries=true&allowPublicKeyRetrieval=true"
  driver: org.postgresql.Driver
spring:
  application:
    name: lazyday
  datasource:
    url: jdbc:${database.dialect}://${database.host}:${database.port}/${database.dbname}${database.options}
    username: ${database.username}
    password: ${database.password}
    driver-class-name: ${database.driver}
  r2dbc:
    url: r2dbc:${database.dialect}://${database.host}:${database.port}/${database.dbname}${database.options}
    username: ${database.username}
    password: ${database.password}
    pool:
      enabled: true
      initial-size: 10
      max-size: 100
      max-idle-time: 60s
      max-acquire-time: 10s
      max-create-connection-time: 5s
  flyway:
    url: jdbc:${database.dialect}://${database.host}:${database.port}/${database.dbname}${database.options}
    user: ${database.username}
    password: ${database.password}
    enabled: true
    table: t_flyway_center_history   #flyway_schema_history，用于记录所有的版本变化记录
    baseline-on-migrate: true
    validate-on-migrate: false
    out-of-order: true
    locations:
      - classpath:db/migration
      - classpath:db/migration-${database.dialect}
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: ${SPRING_MAIL_SSL_ENABLE:true}
          starttls:
            enable: ${SPRING_MAIL_STARTTLS_ENABLE:false}
  ai:
    openai:
      api-key: ${SPRING_AI_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/
      chat:
        options:
          model: qwen3.6-max-preview
      embedding:
        options:
          model: text-embedding-v4 # 必须配置 Embedding 模型
          dimensions: 1536 # 维度需与向量数据库表结构一致
  jackson:
    date-format: ${fan.service.date-format}
    time-zone: ${fan.service.time-zone}
